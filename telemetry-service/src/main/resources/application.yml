server:
  port: 8780

spring:
  application:
    name: vortex-telemetry-service
  datasource:
    url: jdbc:postgresql://localhost:5432/vortexmesh_telemetry
    username: vortex
    password: vortex123
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: telemetry-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.vortexmesh.*

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
