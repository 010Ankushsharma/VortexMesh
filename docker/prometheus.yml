global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'vortex-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway:8080']

  - job_name: 'vortex-service-registry'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['service-registry:8761']

  - job_name: 'vortex-control-plane'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['control-plane:8750']

  - job_name: 'vortex-telemetry'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['telemetry-service:8780']
