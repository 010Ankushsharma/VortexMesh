apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vortex-ingress
  namespace: vortexmesh
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.vortexmesh.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vortex-gateway
                port:
                  number: 80
    - host: admin.vortexmesh.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vortex-admin-dashboard
                port:
                  number: 80
