version: '3.9'

services:
  # Infrastructure
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vortex
      POSTGRES_PASSWORD: vortex123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vortex"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: VortexMeshCluster123456

  # Observability
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: vortex123
    volumes:
      - grafana_data:/var/lib/grafana

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"

  # VortexMesh Services
  config-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: config-server
    ports:
      - "8888:8888"
    depends_on:
      - postgres

  service-registry:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: service-registry
    ports:
      - "8761:8761"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vortexmesh_registry
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  control-plane:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: control-plane
    ports:
      - "8750:8750"
    depends_on:
      - postgres
      - redis
      - kafka
      - service-registry
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vortexmesh_control
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  policy-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: policy-engine
    ports:
      - "8762:8762"
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vortexmesh_policy
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  auth-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: auth-service
    ports:
      - "8770:8770"
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vortexmesh_auth
      SPRING_DATA_REDIS_HOST: redis

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: gateway-cluster
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - kafka
      - service-registry
      - control-plane
      - auth-service
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  telemetry-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: telemetry-service
    ports:
      - "8780:8780"
    depends_on:
      - postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vortexmesh_telemetry
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

volumes:
  postgres_data:
  grafana_data:
